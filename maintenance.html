<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Breka Coffee - Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#55abe5;
font-family:'Balsamiq Sans', sans-serif;
color:white;
text-align:center;
overflow:hidden;
}

/* container */

.container{
max-width:500px;
padding:30px;
}

/* logo */

.logo{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;

margin-bottom:25px;
animation:bounce 2.5s infinite;

filter:drop-shadow(0 0 12px rgba(255,255,255,0.8))
drop-shadow(0 0 35px rgba(255,255,255,0.4));
}

/* title */

h1{
font-size:2.2rem;
margin-bottom:10px;
}

p{
opacity:0.9;
margin-bottom:20px;
}

/* progress bar */

.progress{
width:100%;
height:8px;
background:rgba(255,255,255,0.3);
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.bar{
height:100%;
width:40%;
background:white;
animation:loading 2s infinite;
}

/* countdown */

.countdown{
font-size:1.1rem;
margin-top:25px;
font-weight:600;
}

/* animation */

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

@keyframes loading{
0%{margin-left:-40%}
100%{margin-left:100%}
}

/* mobile */

@media(max-width:640px){

.logo{
width:120px;
}

h1{
font-size:1.6rem;
}

}

</style>
</head>

<body>

<div class="container">

<img src="breka_logo_512.png" class="logo">

<h1>Website Sedang Maintenance</h1>

<p>
Kami sedang melakukan pembaruan agar pengalaman kamu lebih baik ☕
</p>

<div class="progress">
<div class="bar"></div>
</div>

<div class="countdown">
Sedang melakukan update untuk pengalaman yang lebih baik ☕
</div>

</div>

</body>
</html>
